<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1c1917">
    <title>Au Murmure des Flots - Gestion</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="shell">

        <!-- Rail gauche — navigation icônes -->
        <nav class="rail">
            <a href="#" class="rail-item active" data-view="today" title="Aujourd'hui">
                <span class="rail-icon">📅</span>
            </a>
            <a href="#" class="rail-item" data-view="pending" title="À confirmer">
                <span class="rail-icon">⏳</span>
                <span class="badge" id="pending-badge" style="display: none;">0</span>
            </a>
            <a href="#" class="rail-item" data-view="week" title="Semaine">
                <span class="rail-icon">📆</span>
            </a>
            <a href="#" class="rail-item" data-view="month" title="Mois">
                <span class="rail-icon">🗓️</span>
            </a>
            <div class="rail-spacer"></div>
            <a href="#" class="rail-item rail-add" data-view="new" title="Nouvelle réservation">
                <span class="rail-icon">➕</span>
            </a>
        </nav>

        <!-- Zone de travail -->
        <div class="workarea">

            <!-- Barre supérieure -->
            <div class="app-bar">
                <span class="app-bar-title">Au Murmure des Flots</span>
                <div class="connection-status" id="connection-status">
                    <span class="status-dot"></span>
                    <span class="status-text">Connexion...</span>
                </div>
            </div>

            <!-- Contenu principal -->
            <main id="main-content">
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Chargement des réservations...</p>
                </div>
                <div id="content"></div>
            </main>

        </div>
    </div>

    <!-- Modal détails réservation -->
    <div id="reservation-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Détails</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- Modal nouvelle réservation -->
    <div id="new-reservation-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nouvelle Réservation</h2>
                <button class="close-btn" onclick="closeNewModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="new-reservation-form">
                    <div class="form-group">
                        <label for="customerName">Nom du client *</label>
                        <input type="text" id="customerName" required>
                    </div>
                    <div class="form-group">
                        <label for="phoneNumber">Téléphone *</label>
                        <input type="tel" id="phoneNumber" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="date">Date *</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-group">
                            <label for="time">Heure *</label>
                            <input type="time" id="time" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="numberOfPeople">Nombre de personnes *</label>
                        <input type="number" id="numberOfPeople" min="1" max="20" value="2" required>
                    </div>
                    <div class="form-group">
                        <label for="specialRequests">Notes / Demandes spéciales</label>
                        <textarea id="specialRequests" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Créer la réservation</button>
                </form>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
