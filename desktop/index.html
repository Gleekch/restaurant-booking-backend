<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: http:; connect-src 'self' http://localhost:3000 ws://localhost:3000 https://restaurant-booking-backend-y3sp.onrender.com wss://restaurant-booking-backend-y3sp.onrender.com;">
    <title>Au Murmure des Flots</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="shell">
        <!-- Rail sombre compact -->
        <nav class="rail">
            <div class="rail-nav">
                <a href="#" data-view="today" class="rail-item active" title="Aujourd'hui"><span class="rail-icon">📅</span></a>
                <a href="#" data-view="pending" class="rail-item" title="À confirmer"><span class="rail-icon">⏳</span></a>
                <a href="#" data-view="week" class="rail-item" title="Semaine"><span class="rail-icon">📆</span></a>
                <a href="#" data-view="month" class="rail-item" title="Mois"><span class="rail-icon">🗓️</span></a>
                <a href="#" data-view="clients" class="rail-item" title="Clients"><span class="rail-icon">👥</span></a>
                <a href="#" data-view="statistics" class="rail-item" title="Statistiques"><span class="rail-icon">📊</span></a>
            </div>
            <div class="rail-bottom">
                <button id="add-reservation-btn" class="rail-add" title="Nouvelle réservation"><span class="rail-icon">＋</span></button>
            </div>
        </nav>

        <!-- Zone de travail -->
        <div class="workarea">
            <!-- App bar (niveau 1) -->
            <div class="app-bar">
                <div class="app-bar-left">
                    <img src="assets/logo.svg" alt="" class="app-logo">
                    <span class="app-name">Au Murmure des Flots</span>
                </div>
                <div class="app-bar-right">
                    <span id="current-date" class="app-meta"></span>
                    <span id="current-time" class="app-meta app-time"></span>
                    <span id="connection-status" class="status-badge disconnected">Déconnecté</span>
                </div>
            </div>

            <!-- View bar (niveau 2) -->
            <div class="view-bar">
                <h2 id="reservations-title" class="view-title">Aujourd'hui</h2>
                <div class="view-bar-actions">
                    <div class="filters">
                        <input type="date" id="date-filter" class="filter-input">
                        <select id="service-filter" class="filter-input">
                            <option value="all">Tous services</option>
                            <option value="midi">Midi</option>
                            <option value="soir">Soir</option>
                        </select>
                        <select id="status-filter" class="filter-input">
                            <option value="all">Tous statuts</option>
                            <option value="pending">En attente</option>
                            <option value="confirmed">Confirmées</option>
                            <option value="cancelled">Annulées</option>
                        </select>
                        <input type="text" id="search-input" class="filter-input filter-search" placeholder="Rechercher...">
                    </div>
                    <button id="show-qr-btn" class="btn-tool" title="Accès tablette">📱</button>
                </div>
            </div>

            <!-- Zone de contenu scrollable -->
            <div class="content-area">
                <div class="reservations-grid" id="reservations-container"></div>

                <div id="clients-section" class="view-section hidden">
                    <div class="clients-toolbar">
                        <input type="text" id="client-search" class="filter-input filter-search" placeholder="Rechercher un client...">
                        <button id="export-clients-btn" class="btn-tool">Exporter CSV</button>
                    </div>
                    <div id="clients-container"></div>
                </div>

                <div id="week-section" class="view-section hidden">
                    <div id="week-container"></div>
                </div>

                <div id="pending-section" class="view-section hidden">
                    <div id="pending-container"></div>
                </div>

                <div id="month-section" class="view-section hidden">
                    <div id="month-container"></div>
                </div>

                <div id="service-detail-section" class="view-section hidden">
                    <div id="service-detail-container"></div>
                </div>

                <div id="statistics-section" class="view-section hidden">
                    <div id="statistics-container"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal nouvelle réservation -->
    <div id="new-reservation-modal" class="modal">
        <div class="modal-surface modal-narrow">
            <div class="modal-header">
                <h2 id="new-reservation-title">Nouvelle Réservation</h2>
                <button class="close-new-modal modal-close">&times;</button>
            </div>
            <form id="new-reservation-form" class="modal-body">
                <div class="form-group">
                    <label for="new-name">Nom complet</label>
                    <input type="text" id="new-name" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="new-date">Date</label>
                        <input type="date" id="new-date" required>
                    </div>
                    <div class="form-group">
                        <label for="new-time">Heure</label>
                        <select id="new-time" required>
                            <option value="">Choisir</option>
                            <optgroup label="Midi">
                                <option value="12:00">12:00</option>
                                <option value="12:15">12:15</option>
                                <option value="12:30">12:30</option>
                                <option value="12:45">12:45</option>
                                <option value="13:00">13:00</option>
                                <option value="13:15">13:15</option>
                            </optgroup>
                            <optgroup label="Soir">
                                <option value="18:30">18:30</option>
                                <option value="18:45">18:45</option>
                                <option value="19:00">19:00</option>
                                <option value="19:15">19:15</option>
                                <option value="19:30">19:30</option>
                                <option value="19:45">19:45</option>
                                <option value="20:00">20:00</option>
                                <option value="20:15">20:15</option>
                                <option value="20:30">20:30</option>
                                <option value="20:45">20:45</option>
                                <option value="21:00">21:00</option>
                            </optgroup>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="new-people">Personnes</label>
                        <input type="number" id="new-people" min="1" value="2" required placeholder="Nombre de personnes">
                    </div>
                    <div class="form-group">
                        <label for="new-phone">Téléphone</label>
                        <input type="tel" id="new-phone" required placeholder="0692123456">
                    </div>
                </div>
                <div class="form-group">
                    <label for="new-email">Email</label>
                    <input type="email" id="new-email" placeholder="client@email.com">
                </div>
                <div class="form-group">
                    <label for="new-requests">Demandes spéciales</label>
                    <textarea id="new-requests" rows="2" placeholder="Allergies, préférences..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-new-btn">Annuler</button>
                    <button type="submit" class="btn btn-primary" id="submit-reservation-btn">Créer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal détails réservation -->
    <div id="reservation-modal" class="modal">
        <div class="modal-surface modal-narrow">
            <div class="modal-header">
                <h2>Détails</h2>
                <button class="close modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div id="reservation-details"></div>
                <div class="modal-actions">
                    <button id="confirm-btn" class="btn btn-success">Confirmer</button>
                    <button id="cancel-btn" class="btn btn-danger">Annuler</button>
                    <button id="edit-btn" class="btn btn-secondary">Modifier</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal QR Code -->
    <div id="qr-modal" class="modal">
        <div class="modal-surface modal-narrow">
            <div class="modal-header">
                <h2>Accès Tablette</h2>
                <button class="close-qr-modal modal-close">&times;</button>
            </div>
            <div class="modal-body modal-center">
                <p class="text-muted">Scannez pour accéder au tableau de bord</p>
                <div class="qr-container">
                    <img id="qr-code-img" src="" alt="QR Code">
                </div>
                <p class="text-xs text-muted" id="admin-url-display"></p>
                <button id="copy-url-btn" class="btn btn-secondary" style="margin-top: 12px;">Copier l'URL</button>
            </div>
        </div>
    </div>

    <script type="module" src="renderer.js"></script>
</body>
</html>
